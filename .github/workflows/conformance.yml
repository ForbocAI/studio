name: FP/RTK Conformance

on:
  pull_request:
    paths:
      - "src/**"
      - ".github/workflows/conformance.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/conformance.yml"
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout studio
        uses: actions/checkout@v4

      - name: Checkout classified
        uses: actions/checkout@v4
        with:
          repository: ForbocAI/classified
          path: classified-checkout
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check FP conformance
        run: |
          shopt -s globstar
          bash classified-checkout/scripts/check-fp-conformance.sh src/**/*.ts src/**/*.tsx

      - name: Check RTK conformance
        run: |
          bash classified-checkout/scripts/check-rtk-conformance.sh src/store
